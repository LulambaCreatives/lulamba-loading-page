<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lulamba Creatives | Loading...</title>
  <meta name="description" content="Lulamba Creatives - Technology, Design and Innovation from Zambia." />
  <meta name="theme-color" content="#00ffd0" />

  <!-- Open Graph (basic) -->
  <meta property="og:title" content="Lulamba Creatives" />
  <meta property="og:description" content="Animated loading page for Lulamba Creatives" />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <canvas id="particleCanvas" aria-hidden="true"></canvas>

  <main class="container" role="main">
    <picture>
      <source type="image/webp" srcset="assets/img/logo-256.webp 256w" sizes="(max-width:600px) 256px, 256px">
      <img src="logo.png" alt="Lulamba Creatives logo" class="logo-img" decoding="async" loading="lazy">
    </picture>

    <h1 class="logo-text">Lulamba Creatives</h1>
    <p class="tagline" id="tagline">Innovate. Design. Inspire.</p>

    <div class="loader" aria-hidden="true"></div>

    <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <span id="progressFill"></span>
    </div>

    <p class="message" id="message">Preparing something amazing for you</p>

    <div class="names" id="nameCycle" aria-live="polite">Stickie Fingers</div>

    <div class="controls" role="toolbar" aria-label="Controls">
      <button id="themeToggle" title="Toggle Theme" aria-pressed="false" aria-label="Toggle Theme">🌙</button>
      <button id="soundToggle" title="Toggle Sound" aria-pressed="false" aria-label="Toggle Sound">🔊</button>
      <button id="enterSite" class="enter" disabled aria-disabled="true">Enter site</button>
    </div>
  </main>

  <script src="assets/js/main.js" defer></script>
</body>
</html>
